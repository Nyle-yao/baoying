name: Pages Schedule Watchdog

on:
  workflow_dispatch: {}
  schedule:
    - cron: "40 2 * * 1-5" # Asia/Shanghai 10:40
    - cron: "40 8 * * 1-5" # Asia/Shanghai 16:40

permissions:
  actions: write
  contents: read

jobs:
  ensure-update-run:
    runs-on: ubuntu-latest
    steps:
      - name: Check missed schedule and trigger fallback dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WORKFLOW_FILE: pages-update.yml
        run: |
          python - <<'PY'
          import os
          import json
          import urllib.request
          from datetime import datetime, timezone

          token = os.getenv("GH_TOKEN", "")
          repo = os.getenv("REPO", "")
          workflow_file = os.getenv("WORKFLOW_FILE", "pages-update.yml")

          if not token or not repo:
              raise SystemExit("missing github context")

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def get(url: str) -> dict:
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def post(url: str, payload: dict) -> None:
              req = urllib.request.Request(
                  url,
                  data=json.dumps(payload).encode("utf-8"),
                  headers={**headers, "Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=30):
                  return

          now = datetime.now(timezone.utc)
          # This watchdog cron only runs at UTC 02:40 (10:40 CST) or
          # 08:30 (16:30 CST) on trading weekdays.
          slot_hour = 2 if now.hour < 6 else 8
          if slot_hour == 2:
              slot_start = now.replace(hour=slot_hour, minute=25, second=0, microsecond=0)
              slot_end = now.replace(hour=slot_hour, minute=59, second=59, microsecond=0)
          else:
              # Main PM schedule is 16:20 CST (UTC 08:20), keep a tolerant window.
              slot_start = now.replace(hour=slot_hour, minute=15, second=0, microsecond=0)
              slot_end = now.replace(hour=slot_hour, minute=49, second=59, microsecond=0)

          runs_url = (
              f"https://api.github.com/repos/{repo}/actions/workflows/{workflow_file}/runs?per_page=50"
          )
          runs = get(runs_url).get("workflow_runs", [])

          covered = False
          for run in runs:
              created = run.get("created_at")
              if not created:
                  continue
              created_at = datetime.fromisoformat(created.replace("Z", "+00:00"))
              if slot_start <= created_at <= slot_end:
                  # any run in this slot means update pipeline has started; no fallback needed
                  covered = True
                  break

          print(f"slot_window_utc={slot_start.isoformat()}~{slot_end.isoformat()}")
          print(f"covered={covered}")
          if covered:
              print("No fallback dispatch needed.")
              raise SystemExit(0)

          dispatch_url = (
              f"https://api.github.com/repos/{repo}/actions/workflows/{workflow_file}/dispatches"
          )
          post(dispatch_url, {"ref": "main"})
          print("Fallback dispatch triggered.")
          PY
