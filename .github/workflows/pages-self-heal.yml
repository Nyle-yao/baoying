name: Pages Deploy Self-Heal

on:
  workflow_run:
    workflows: ["Update Dashboards And Deploy Pages"]
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  rerun-on-failure:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Rerun failed workflow once
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          set -euo pipefail
          echo "Run ${RUN_ID} failed at attempt ${ATTEMPT}. Triggering rerun..."
          curl -sS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/rerun-failed-jobs"
          echo "Rerun request sent."
