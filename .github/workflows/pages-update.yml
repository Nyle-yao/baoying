name: Update Dashboards And Deploy Pages

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 2 * * 1-5" # Asia/Shanghai 10:30, Mon-Fri
    - cron: "20 8 * * 1-5" # Asia/Shanghai 16:20, Mon-Fri

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pages.txt

      - name: Notify start (WeChat/Email)
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          python notify_update_status.py --event start

      - name: Run full update pipeline
        env:
          TZ: Asia/Shanghai
          CD_NAMESPACE_NAME: ${{ secrets.CD_NAMESPACE_NAME }}
          CD_USER_NAME: ${{ secrets.CD_USER_NAME }}
          CD_PASSWORD: ${{ secrets.CD_PASSWORD }}
          CD_TARGET: ${{ secrets.CD_TARGET }}
          CD_BROWSER_ID: ${{ secrets.CD_BROWSER_ID }}
        run: |
          EXTRA_ARGS="--skip-detail-crawl --max-funds 120"
          echo "Using quick update mode for both scheduled and manual runs"
          python run_full_update_pipeline.py \
            --namespace-name "${CD_NAMESPACE_NAME}" \
            --user-name "${CD_USER_NAME}" \
            --password "${CD_PASSWORD}" \
            --target "${CD_TARGET:-https://www.cdollar.cn/leshu-pro/#/e/vq6aKqp5YU}" \
            --browser-id "${CD_BROWSER_ID:-09cb220223cb45410e11e84679b83fb6}" \
            ${EXTRA_ARGS}

      - name: Resolve Latest Date
        id: latest
        run: |
          LATEST_DATE=$(python -c 'from pathlib import Path; import pandas as pd; wb = Path("exports/addsub/加仓减仓分表版20260312_20260409.xlsx"); raw = pd.read_excel(wb, sheet_name="Raw_Data"); raw["统计日期"] = pd.to_datetime(raw["统计日期"], errors="coerce"); latest = raw["统计日期"].max(); print(latest.strftime("%Y-%m-%d"))')
          echo "latest_date=${LATEST_DATE}" >> "$GITHUB_OUTPUT"
          echo "LATEST_DATE=${LATEST_DATE}" >> "$GITHUB_ENV"

      - name: QA Gate 1 - Validate Pipeline
        env:
          CD_NAMESPACE_NAME: ${{ secrets.CD_NAMESPACE_NAME }}
          CD_USER_NAME: ${{ secrets.CD_USER_NAME }}
          CD_PASSWORD: ${{ secrets.CD_PASSWORD }}
          CD_TARGET: ${{ secrets.CD_TARGET }}
          CD_BROWSER_ID: ${{ secrets.CD_BROWSER_ID }}
        run: |
          python qa_validate_pipeline.py \
            --workbook "exports/addsub/加仓减仓分表版20260312_20260409.xlsx" \
            --namespace-name "${CD_NAMESPACE_NAME}" \
            --user-name "${CD_USER_NAME}" \
            --password "${CD_PASSWORD}" \
            --target "${CD_TARGET:-https://www.cdollar.cn/leshu-pro/#/e/vq6aKqp5YU}" \
            --browser-id "${CD_BROWSER_ID:-09cb220223cb45410e11e84679b83fb6}" \
            --live-date "${LATEST_DATE}"

      - name: QA Gate 2 - Strict End-to-End
        run: |
          python qa_strict_end_to_end.py \
            --workbook "exports/addsub/加仓减仓分表版20260312_20260409.xlsx" \
            --core-html "docs/index.html" \
            --ops-html "docs/ops-metrics.html" \
            --weak-html "docs/competitor-weakness.html"

      - name: Commit updated data and dashboards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports/addsub docs \
            *.py .github/workflows/pages-update.yml requirements-pages.txt || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update dashboards"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify success (WeChat/Email)
        if: ${{ success() }}
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          python notify_update_status.py --event success --include-meta --extra "Pages: ${{ steps.deployment.outputs.page_url }}"

      - name: Notify failure (WeChat/Email)
        if: ${{ failure() }}
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          python notify_update_status.py --event failure

      - name: QA/Deploy Summary
        if: ${{ always() }}
        run: |
          {
            echo "## 更新结果"
            echo "- event: ${{ github.event_name }}"
            echo "- latest_date: ${LATEST_DATE:-unknown}"
            echo "- run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- result: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
