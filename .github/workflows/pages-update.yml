name: Update Dashboards And Deploy Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * 1-5" # Asia/Shanghai 10:30, Mon-Fri
    - cron: "30 8 * * 1-5" # Asia/Shanghai 16:30, Mon-Fri

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pages.txt

      - name: Run full update pipeline
        env:
          TZ: Asia/Shanghai
          CD_NAMESPACE_NAME: ${{ secrets.CD_NAMESPACE_NAME }}
          CD_USER_NAME: ${{ secrets.CD_USER_NAME }}
          CD_PASSWORD: ${{ secrets.CD_PASSWORD }}
          CD_TARGET: ${{ secrets.CD_TARGET }}
          CD_BROWSER_ID: ${{ secrets.CD_BROWSER_ID }}
        run: |
          EXTRA_ARGS="--skip-detail-crawl --max-funds 120"
          echo "Using quick update mode for both scheduled and manual runs"
          python run_full_update_pipeline.py \
            --namespace-name "${CD_NAMESPACE_NAME}" \
            --user-name "${CD_USER_NAME}" \
            --password "${CD_PASSWORD}" \
            --target "${CD_TARGET:-https://www.cdollar.cn/leshu-pro/#/e/vq6aKqp5YU}" \
            --browser-id "${CD_BROWSER_ID:-09cb220223cb45410e11e84679b83fb6}" \
            ${EXTRA_ARGS}

      - name: Commit updated data and dashboards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports/addsub docs \
            *.py .github/workflows/pages-update.yml requirements-pages.txt || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update dashboards"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
